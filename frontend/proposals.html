<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Müraciətlərim — FreeLance</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/dashboard.css" />
</head>
<body>
  <div id="navbar"></div>

  <div class="container" style="padding-top:24px;padding-bottom:48px">
    <!-- Header -->
    <div class="d-flex align-center justify-between mb-24 flex-wrap gap-12">
      <div>
        <h2>📄 Müraciətlərim</h2>
        <p class="text-muted">Bütün müraciətlərinizi idarə edin</p>
      </div>
      <div class="d-flex gap-8 flex-wrap">
        <select class="form-control" id="statusFilter" onchange="filterProposals()" style="width:160px">
          <option value="">Bütün Statuslar</option>
          <option value="PENDING">Gözləyir</option>
          <option value="ACCEPTED">Qəbul Edildi</option>
          <option value="REJECTED">Rədd Edildi</option>
          <option value="WITHDRAWN">Geri Çəkildi</option>
        </select>
        <a href="jobs.html" class="btn btn-primary">+ Yeni İş Tap</a>
      </div>
    </div>

    <!-- Stats -->
    <div class="stats-grid mb-24" id="propStats" style="display:none"></div>

    <!-- Proposals list -->
    <div id="proposalsList"><div class="page-loader"><div class="spinner"></div></div></div>
  </div>

  <!-- EDIT PROPOSAL MODAL -->
  <div class="modal-overlay" id="editModal">
    <div class="modal">
      <div class="modal-header"><h3>Müraciəti Düzəliş Et</h3><button class="modal-close">✕</button></div>
      <div class="modal-body">
        <div class="alert alert-danger" id="editErr"><span>❌</span><span id="editErrMsg"></span></div>
        <input type="hidden" id="editId" />
        <div class="form-group">
          <label class="form-label">Müraciət Məktubu</label>
          <textarea class="form-control" id="editCover" rows="5"></textarea>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
          <div class="form-group">
            <label class="form-label">Məbləğ ($)</label>
            <input class="form-control" type="number" id="editAmount" min="1" />
          </div>
          <div class="form-group">
            <label class="form-label">Müddət (gün)</label>
            <input class="form-control" type="number" id="editDays" min="1" />
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="closeModal('editModal')">Ləğv et</button>
        <button class="btn btn-primary" id="saveEditBtn" onclick="saveEdit()">💾 Yadda Saxla</button>
      </div>
    </div>
  </div>

  <!-- DETAIL MODAL -->
  <div class="modal-overlay" id="detailModal">
    <div class="modal" style="max-width:540px">
      <div class="modal-header"><h3>Müraciət Detalları</h3><button class="modal-close">✕</button></div>
      <div class="modal-body" id="detailBody"></div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script>
    if (!requireAuth()) throw new Error();
    if (Auth.isAdmin()) { window.location.href = 'admin.html'; throw 0; }
    if (!Auth.isFreelancer()) { window.location.href = 'dashboard.html'; throw 0; }

    renderNavbar('proposals');

    let proposals = [];
    const statusLabels = { PENDING: 'Gözləyir', ACCEPTED: 'Qəbul edildi', REJECTED: 'Rədd edildi', WITHDRAWN: 'Geri çəkildi' };

    async function load() {
      try {
        proposals = await ProposalsAPI.getAll();
        renderStats();
        filterProposals();
      } catch (err) {
        document.getElementById('proposalsList').innerHTML = `<div class="empty-state"><div class="icon">⚠️</div><p>Müraciətlər yüklənə bilmədi</p></div>`;
      }
    }

    function renderStats() {
      const stats = document.getElementById('propStats');
      stats.style.display = 'grid';
      stats.innerHTML = `
        <div class="stat-card"><div class="stat-number">${proposals.length}</div><div class="stat-label">Ümumi</div></div>
        <div class="stat-card"><div class="stat-number">${proposals.filter(p=>p.status==='PENDING').length}</div><div class="stat-label">Gözləyir</div></div>
        <div class="stat-card"><div class="stat-number">${proposals.filter(p=>p.status==='ACCEPTED').length}</div><div class="stat-label">Qəbul Edildi</div></div>
        <div class="stat-card"><div class="stat-number">${proposals.filter(p=>p.status==='REJECTED').length}</div><div class="stat-label">Rədd Edildi</div></div>
      `;
    }

    function filterProposals() {
      const status = document.getElementById('statusFilter').value;
      const filtered = !status ? proposals : proposals.filter(p => p.status === status);
      renderProposals(filtered);
    }

    function renderProposals(list) {
      if (list.length === 0) {
        document.getElementById('proposalsList').innerHTML = `
          <div class="empty-state"><div class="icon">📄</div><p>Bu filterdə müraciət tapılmadı</p><a href="/jobs.html" class="btn btn-outline">İşlərə Bax</a></div>`;
        return;
      }
      document.getElementById('proposalsList').innerHTML = list.map(p => `
        <div class="proposal-card animate-in">
          <div class="proposal-header">
            <div style="flex:1">
              <div style="font-weight:700;font-size:.95rem;margin-bottom:4px">${p.job ? escHtml(p.job.title) : 'İş'}</div>
              <div class="proposal-meta">
                <span>💰 <strong>$${p.amount}</strong></span>
                <span>📅 <strong>${p.estimatedDays} gün</strong></span>
                <span>🗓 ${formatDate(p.createdAt)}</span>
                ${p.updatedAt ? `<span>✏️ ${formatDate(p.updatedAt)}</span>` : ''}
              </div>
            </div>
            <span class="${badgeForStatus(p.status)}">${statusLabels[p.status]}</span>
          </div>
          ${p.coverLetter ? `<p style="font-size:.875rem;color:var(--gray-700);margin:10px 0;line-height:1.6;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden">${escHtml(p.coverLetter)}</p>` : ''}
          <div class="proposal-actions">
            <button class="btn btn-sm btn-ghost" onclick="showDetail(${p.id})">👁 Detallar</button>
            ${p.status === 'PENDING' ? `
              <button class="btn btn-sm btn-outline" onclick="openEdit(${p.id})">✏️ Düzəliş</button>
              <button class="btn btn-sm btn-warning" onclick="withdraw(${p.id})">↩️ Geri çək</button>
              <button class="btn btn-sm btn-danger" onclick="deleteP(${p.id})">🗑️ Sil</button>
            ` : ''}
          </div>
        </div>`).join('');
    }

    function showDetail(id) {
      const p = proposals.find(pr => pr.id === id);
      if (!p) return;
      document.getElementById('detailBody').innerHTML = `
        <div class="d-flex align-center gap-8 mb-16 flex-wrap">
          <span class="${badgeForStatus(p.status)}">${statusLabels[p.status]}</span>
        </div>
        ${p.job ? `<div class="mb-16"><h4 class="mb-8">İş</h4><p style="font-weight:600">${escHtml(p.job.title)}</p></div>` : ''}
        <div class="mb-16" style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
          <div style="background:var(--gray-100);padding:16px;border-radius:var(--radius);text-align:center">
            <div style="font-size:1.4rem;font-weight:800;color:var(--primary)">$${p.amount}</div>
            <div style="font-size:.75rem;color:var(--gray-500);margin-top:4px">Təklif Məbləği</div>
          </div>
          <div style="background:var(--gray-100);padding:16px;border-radius:var(--radius);text-align:center">
            <div style="font-size:1.4rem;font-weight:800;color:var(--secondary)">${p.estimatedDays}</div>
            <div style="font-size:.75rem;color:var(--gray-500);margin-top:4px">Müddət (gün)</div>
          </div>
        </div>
        ${p.coverLetter ? `<div class="mb-16"><h4 class="mb-8">Müraciət Məktubu</h4><p style="font-size:.875rem;line-height:1.8;background:var(--gray-100);padding:16px;border-radius:var(--radius)">${escHtml(p.coverLetter)}</p></div>` : ''}
        <div class="text-muted" style="font-size:.78rem">Göndərildi: ${formatDate(p.createdAt)}</div>
      `;
      openModal('detailModal');
    }

    function openEdit(id) {
      const p = proposals.find(pr => pr.id === id);
      if (!p) return;
      document.getElementById('editId').value = id;
      document.getElementById('editCover').value = p.coverLetter || '';
      document.getElementById('editAmount').value = p.amount || '';
      document.getElementById('editDays').value = p.estimatedDays || '';
      document.getElementById('editErr').classList.remove('show');
      openModal('editModal');
    }

    async function saveEdit() {
      const id = parseInt(document.getElementById('editId').value);
      const coverLetter = document.getElementById('editCover').value.trim();
      const amount = parseFloat(document.getElementById('editAmount').value);
      const estimatedDays = parseInt(document.getElementById('editDays').value);

      const btn = document.getElementById('saveEditBtn');
      btn.classList.add('btn-loading'); btn.disabled = true;
      document.getElementById('editErr').classList.remove('show');

      try {
        const data = {};
        if (coverLetter) data.coverLetter = coverLetter;
        if (amount) data.amount = amount;
        if (estimatedDays) data.estimatedDays = estimatedDays;
        await ProposalsAPI.update(id, data);
        closeModal('editModal');
        showToast('Müraciət yeniləndi ✅', 'success');
        await load();
      } catch (err) {
        document.getElementById('editErrMsg').textContent = getErrorMessage(err);
        document.getElementById('editErr').classList.add('show');
      } finally {
        btn.classList.remove('btn-loading'); btn.disabled = false;
      }
    }

    async function withdraw(id) {
      const ok = await confirmDialog('Bu müraciəti geri çəkmək istədiyinizə əminsinizmi?');
      if (!ok) return;
      try {
        await ProposalsAPI.updateStatus(id, 'WITHDRAWN');
        showToast('Müraciət geri çəkildi', 'info');
        await load();
      } catch (err) {
        showToast(getErrorMessage(err), 'error');
      }
    }

    async function deleteP(id) {
      const ok = await confirmDialog('Bu müraciəti silmək istədiyinizə əminsinizmi?');
      if (!ok) return;
      try {
        await ProposalsAPI.delete(id);
        showToast('Müraciət silindi ✅', 'success');
        await load();
      } catch (err) {
        showToast(getErrorMessage(err), 'error');
      }
    }

    function escHtml(str) {
      if (!str) return '';
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    load();
  </script>
</body>
</html>
