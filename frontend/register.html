<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account — WorkHub</title>
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/auth.css" />
</head>
<body>

  <div id="navbar"></div>

  <main class="auth-page">
    <div class="auth-card" style="max-width:480px">
      <div class="auth-logo">Work<span>Hub</span></div>
      <h1 class="auth-title">Create your account</h1>
      <p class="auth-subtitle">Join thousands of clients and freelancers</p>

      <div id="registerAlert" class="alert alert-danger hidden"></div>

      <!-- ROLE SELECTOR -->
      <div class="form-group">
        <label class="form-label">I want to...</label>
        <div class="role-selector">
          <label class="role-option">
            <input type="radio" name="role" value="CLIENT" checked />
            <div class="role-card">
              <span class="role-icon">🏢</span>
              <span class="role-name">Hire Talent</span>
              <span class="role-desc">Post jobs & find freelancers</span>
            </div>
          </label>
          <label class="role-option">
            <input type="radio" name="role" value="FREELANCER" />
            <div class="role-card">
              <span class="role-icon">💼</span>
              <span class="role-name">Work as Freelancer</span>
              <span class="role-desc">Find jobs & apply</span>
            </div>
          </label>
        </div>
      </div>

      <!-- NAME & SURNAME -->
      <div class="form-grid-2">
        <div class="form-group">
          <label class="form-label">First Name</label>
          <input class="form-control" type="text" id="name" placeholder="John" autocomplete="given-name" />
        </div>
        <div class="form-group">
          <label class="form-label">Last Name</label>
          <input class="form-control" type="text" id="surname" placeholder="Doe" autocomplete="family-name" />
        </div>
      </div>

      <!-- EMAIL -->
      <div class="form-group">
        <label class="form-label">Email Address <span style="color:var(--danger)">*</span></label>
        <input class="form-control" type="email" id="email" placeholder="you@example.com" autocomplete="email" />
      </div>

      <!-- PHONE -->
      <div class="form-group">
        <label class="form-label">Phone Number</label>
        <input class="form-control" type="tel" id="phone" placeholder="+1 555 000 0000" autocomplete="tel" />
      </div>

      <!-- PASSWORD -->
      <div class="form-group">
        <label class="form-label">Password <span style="color:var(--danger)">*</span></label>
        <div class="input-wrapper">
          <input class="form-control" type="password" id="password" placeholder="Min. 6 characters" autocomplete="new-password" />
          <button class="input-eye" onclick="togglePwd('password', this)" type="button" title="Show/hide">👁</button>
        </div>
      </div>

      <!-- CONFIRM PASSWORD -->
      <div class="form-group">
        <label class="form-label">Confirm Password <span style="color:var(--danger)">*</span></label>
        <div class="input-wrapper">
          <input class="form-control" type="password" id="confirm" placeholder="Repeat password" autocomplete="new-password" />
          <button class="input-eye" onclick="togglePwd('confirm', this)" type="button" title="Show/hide">👁</button>
        </div>
      </div>

      <button class="btn btn-primary btn-lg btn-block" id="registerBtn" onclick="handleRegister()">
        🚀 Create Account
      </button>

      <div class="auth-footer mt-12">
        Already have an account? <a href="login.html">Sign in</a>
      </div>
    </div>
  </main>

  <script src="js/api.js"></script>
  <script src="js/main.js"></script>
  <script>
    renderNavbar('');
    redirectIfLoggedIn();

    function togglePwd(id, btn) {
      const el = document.getElementById(id);
      if (el.type === 'password') { el.type = 'text'; btn.textContent = '🙈'; }
      else                        { el.type = 'password'; btn.textContent = '👁'; }
    }

    async function handleRegister() {
      const role     = document.querySelector('input[name="role"]:checked')?.value;
      const name     = document.getElementById('name').value.trim();
      const surname  = document.getElementById('surname').value.trim();
      const email    = document.getElementById('email').value.trim();
      const phone    = document.getElementById('phone').value.trim();
      const password = document.getElementById('password').value;
      const confirm  = document.getElementById('confirm').value;
      const btn      = document.getElementById('registerBtn');

      hideAlert('registerAlert');

      // Client-side validation
      if (!email || !password) {
        showAlert('registerAlert', 'Email and password are required.');
        return;
      }
      if (password.length < 6) {
        showAlert('registerAlert', 'Password must be at least 6 characters.');
        return;
      }
      if (password !== confirm) {
        showAlert('registerAlert', 'Passwords do not match.');
        return;
      }

      const payload = { email, password, role };
      if (name)    payload.name    = name;
      if (surname) payload.surname = surname;
      if (phone)   payload.phone   = phone;

      setBtnLoading(btn, true, 'Creating account...');
      try {
        const res = await AuthAPI.register(payload);
        Auth.setSession(res.user, res.accessToken);

        showToast('Account created! Welcome to WorkHub 🎉', 'success');
        setTimeout(() => {
          window.location.href = role === 'ADMIN' ? 'admin.html' : 'dashboard.html';
        }, 800);
      } catch (err) {
        showAlert('registerAlert', getErrorMessage(err));
        setBtnLoading(btn, false);
      }
    }

    document.getElementById('confirm').addEventListener('keydown', e => {
      if (e.key === 'Enter') handleRegister();
    });
  </script>
</body>
</html>
