<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Qeydiyyat — FreeLance</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/auth.css" />
</head>
<body>
  <div class="auth-page">
    <div class="auth-card" style="max-width:480px">
      <div class="auth-header">
        <div class="auth-logo">Free<span>Lance</span></div>
        <div class="auth-subtitle">Yeni hesab yaradın</div>
      </div>
      <div class="auth-body">
        <div class="alert alert-danger" id="errorAlert">
          <span>❌</span><span id="errorMsg"></span>
        </div>
        <div class="alert alert-success" id="successAlert">
          <span>✅</span><span>Qeydiyyat uğurlu oldu! Yönləndirilirsiniz...</span>
        </div>

        <form id="registerForm" novalidate>
          <!-- Role Selection -->
          <div class="form-group">
            <label class="form-label">Rol seçin</label>
            <div class="role-selector">
              <label class="role-option">
                <input type="radio" name="role" value="FREELANCER" checked />
                <div class="role-icon">💼</div>
                <div class="role-name">Freelancer</div>
                <div class="role-desc">İşlərə müraciət et</div>
              </label>
              <label class="role-option">
                <input type="radio" name="role" value="CLIENT" />
                <div class="role-icon">🏢</div>
                <div class="role-name">Client</div>
                <div class="role-desc">İş elanı yerləşdir</div>
              </label>
            </div>
          </div>

          <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
            <div class="form-group">
              <label class="form-label" for="name">Ad *</label>
              <input class="form-control" type="text" id="name" placeholder="Adınız" required />
              <div class="form-error" id="nameErr">Ad tələb olunur</div>
            </div>
            <div class="form-group">
              <label class="form-label" for="surname">Soyad</label>
              <input class="form-control" type="text" id="surname" placeholder="Soyadınız" />
            </div>
          </div>

          <div class="form-group">
            <label class="form-label" for="email">E-mail *</label>
            <input class="form-control" type="email" id="email" placeholder="ad@example.com" required />
            <div class="form-error" id="emailErr">Düzgün e-mail daxil edin</div>
          </div>

          <div class="form-group">
            <label class="form-label" for="phone">Telefon</label>
            <input class="form-control" type="tel" id="phone" placeholder="+994 XX XXX XX XX" />
          </div>

          <div class="form-group">
            <label class="form-label" for="password">Şifrə *</label>
            <div style="position:relative">
              <input class="form-control" type="password" id="password" placeholder="Ən az 8 simvol" style="padding-right:44px" required />
              <button type="button" id="togglePass" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--gray-500);font-size:1rem">👁</button>
            </div>
            <div class="form-error" id="passErr">Şifrə minimum 8 simvol olmalıdır</div>
          </div>

          <div class="form-group">
            <label class="form-label" for="passConfirm">Şifrəni təsdiqlə *</label>
            <input class="form-control" type="password" id="passConfirm" placeholder="Şifrəni yenidən daxil edin" required />
            <div class="form-error" id="passConfirmErr">Şifrələr uyğun gəlmir</div>
          </div>

          <button type="submit" class="btn btn-primary btn-block btn-lg" id="submitBtn">
            Qeydiyyatdan Keç
          </button>
        </form>

        <div class="auth-footer">
          Artıq hesabınız var? <a href="login.html">Daxil olun</a>
        </div>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script>
    requireGuest();

    const form = document.getElementById('registerForm');
    const submitBtn = document.getElementById('submitBtn');

    document.getElementById('togglePass').addEventListener('click', function() {
      const p = document.getElementById('password');
      p.type = p.type === 'password' ? 'text' : 'password';
      this.textContent = p.type === 'password' ? '👁' : '🙈';
    });

    function showError(msg) {
      document.getElementById('errorMsg').textContent = msg;
      document.getElementById('errorAlert').classList.add('show');
      document.getElementById('successAlert').classList.remove('show');
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      document.getElementById('errorAlert').classList.remove('show');

      const role = document.querySelector('input[name="role"]:checked').value;
      const name = document.getElementById('name').value.trim();
      const surname = document.getElementById('surname').value.trim();
      const email = document.getElementById('email').value.trim();
      const phone = document.getElementById('phone').value.trim();
      const password = document.getElementById('password').value;
      const passConfirm = document.getElementById('passConfirm').value;

      // Clear errors
      ['nameErr','emailErr','passErr','passConfirmErr'].forEach(id => {
        document.getElementById(id).classList.remove('show');
      });
      ['name','email','password','passConfirm'].forEach(id => {
        document.getElementById(id).classList.remove('is-error');
      });

      let valid = true;
      if (!name) { document.getElementById('nameErr').classList.add('show'); document.getElementById('name').classList.add('is-error'); valid = false; }
      if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { document.getElementById('emailErr').classList.add('show'); document.getElementById('email').classList.add('is-error'); valid = false; }
      if (!password || password.length < 8) { document.getElementById('passErr').classList.add('show'); document.getElementById('password').classList.add('is-error'); valid = false; }
      if (password !== passConfirm) { document.getElementById('passConfirmErr').classList.add('show'); document.getElementById('passConfirm').classList.add('is-error'); valid = false; }
      if (!valid) return;

      submitBtn.classList.add('btn-loading');
      submitBtn.disabled = true;

      try {
        const body = { email, password, name, role };
        if (surname) body.surname = surname;
        if (phone) body.phone = phone;

        const data = await AuthAPI.register(body);
        Auth.setSession(data.user, data.accessToken);
        document.getElementById('successAlert').classList.add('show');
        setTimeout(() => {
          if (data.user.role === 'ADMIN') window.location.href = 'admin.html';
          else window.location.href = 'dashboard.html';
        }, 1200);
      } catch (err) {
        showError(getErrorMessage(err));
        submitBtn.classList.remove('btn-loading');
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
