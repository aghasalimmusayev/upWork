<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Browse Jobs — WorkHub</title>
  <link rel="stylesheet" href="css/main.css" />
  <style>
    .jobs-page { padding: 32px 0 60px; }
    .filter-panel {
      background: var(--white);
      border: 1px solid var(--gray-200);
      border-radius: var(--r-lg);
      padding: 16px;
      margin-bottom: 20px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
    }
    .filter-panel input, .filter-panel select {
      flex: 1;
      min-width: 150px;
      padding: 9px 13px;
      border: 1.5px solid var(--gray-200);
      border-radius: var(--r-md);
      font-size: 0.88rem;
      font-family: var(--font-body);
      outline: none;
      transition: border-color var(--ease);
    }
    .filter-panel input:focus, .filter-panel select:focus { border-color: var(--primary); }
    .filter-panel .filter-sep { width: 1px; height: 24px; background: var(--gray-200); flex-shrink: 0; }
    .results-count { font-size: 0.85rem; color: var(--gray-500); margin-bottom: 16px; }
    .jobs-grid { display: flex; flex-direction: column; gap: 14px; }
    .apply-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .job-card-full { padding: 22px 24px; }

    @media (max-width: 600px) {
      .filter-panel { flex-direction: column; }
      .filter-panel input, .filter-panel select { width: 100%; min-width: 0; }
      .filter-panel .filter-sep { display: none; }
    }
  </style>
</head>
<body>

  <div id="navbar"></div>

  <div class="jobs-page">
    <div class="container">
      <div class="section-header">
        <div>
          <h1 style="font-size:1.7rem;margin-bottom:4px">Browse Open Jobs</h1>
          <p class="text-muted">Find the perfect project for your skills</p>
        </div>
        <div id="clientCreateBtn" style="display:none">
          <button class="btn btn-primary" onclick="openModal('createJobModal')">
            ＋ Post a Job
          </button>
        </div>
      </div>

      <!-- FILTERS -->
      <div class="filter-panel">
        <input type="text" id="searchQ" placeholder="🔍  Search title, skills, category..." oninput="applyFilters()" />
        <div class="filter-sep"></div>
        <select id="filterStatus" onchange="applyFilters()">
          <option value="">All Statuses</option>
          <option value="OPEN">Open</option>
          <option value="CLOSED">Closed</option>
        </select>
        <select id="filterPayment" onchange="applyFilters()">
          <option value="">All Payment Types</option>
          <option value="FIXED">Fixed Price</option>
          <option value="HOURLY">Hourly</option>
        </select>
        <button class="btn btn-ghost btn-sm" onclick="clearFilters()">✕ Clear</button>
      </div>

      <p class="results-count" id="resultsCount"></p>

      <div id="jobsContainer">
        <div class="page-loader"><div class="spinner"></div></div>
      </div>
    </div>
  </div>

  <!-- ── CREATE JOB MODAL (CLIENT) ── -->
  <div class="modal-overlay" id="createJobModal">
    <div class="modal" style="max-width:560px">
      <div class="modal-header">
        <h3 id="jobModalTitle">Post a New Job</h3>
        <button class="modal-close">✕</button>
      </div>
      <div class="modal-body">
        <div id="jobFormAlert" class="alert alert-danger hidden"></div>
        <input type="hidden" id="editJobId" />

        <div class="form-group">
          <label class="form-label">Job Title <span style="color:var(--danger)">*</span></label>
          <input class="form-control" type="text" id="jobTitle" placeholder="e.g. React Frontend Developer" />
        </div>
        <div class="form-group">
          <label class="form-label">Description</label>
          <textarea class="form-control" id="jobDesc" rows="4" placeholder="Describe the job in detail..."></textarea>
        </div>
        <div class="form-grid-2">
          <div class="form-group">
            <label class="form-label">Payment Type <span style="color:var(--danger)">*</span></label>
            <select class="form-control" id="jobPayment">
              <option value="FIXED">Fixed Price</option>
              <option value="HOURLY">Hourly</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Budget ($) <span style="color:var(--danger)">*</span></label>
            <input class="form-control" type="number" id="jobPrice" placeholder="500" min="1" />
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Category <span style="color:var(--danger)">*</span></label>
          <input class="form-control" type="text" id="jobCategory" placeholder="e.g. Web Development" />
        </div>
        <div class="form-group">
          <label class="form-label">Required Skills <span style="color:var(--danger)">*</span></label>
          <input class="form-control" type="text" id="jobSkills" placeholder="React, TypeScript, Node.js (comma-separated)" />
          <span class="form-hint">Separate skills with commas</span>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="closeModal('createJobModal')">Cancel</button>
        <button class="btn btn-primary" id="saveJobBtn" onclick="saveJob()">💾 Save Job</button>
      </div>
    </div>
  </div>

  <!-- ── APPLY PROPOSAL MODAL (FREELANCER) ── -->
  <div class="modal-overlay" id="applyModal">
    <div class="modal" style="max-width:500px">
      <div class="modal-header">
        <h3>Submit a Proposal</h3>
        <button class="modal-close">✕</button>
      </div>
      <div class="modal-body">
        <div id="applyAlert" class="alert alert-danger hidden"></div>
        <input type="hidden" id="applyJobId" />
        <p class="mb-16 text-muted" style="font-size:.85rem">
          Applying for: <strong id="applyJobTitle" style="color:var(--gray-900)"></strong>
        </p>

        <div class="form-group">
          <label class="form-label">Cover Letter <span style="color:var(--danger)">*</span></label>
          <textarea class="form-control" id="applyLetter" rows="5"
            placeholder="Introduce yourself and explain why you're the best fit for this job..."></textarea>
        </div>
        <div class="form-grid-2">
          <div class="form-group">
            <label class="form-label">Your Bid ($) <span style="color:var(--danger)">*</span></label>
            <input class="form-control" type="number" id="applyAmount" placeholder="0" min="1" />
          </div>
          <div class="form-group">
            <label class="form-label">Estimated Days <span style="color:var(--danger)">*</span></label>
            <input class="form-control" type="number" id="applyDays" placeholder="7" min="1" />
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="closeModal('applyModal')">Cancel</button>
        <button class="btn btn-primary" id="applySubmitBtn" onclick="submitProposal()">🚀 Submit Proposal</button>
      </div>
    </div>
  </div>

  <!-- ── VIEW JOB DETAIL MODAL ── -->
  <div class="modal-overlay" id="jobDetailModal">
    <div class="modal" style="max-width:600px">
      <div class="modal-header">
        <h3 id="detailTitle">Job Details</h3>
        <button class="modal-close">✕</button>
      </div>
      <div class="modal-body" id="jobDetailBody"></div>
      <div class="modal-footer" id="jobDetailFooter"></div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/main.js"></script>
  <script src="js/jobs.js"></script>
</body>
</html>
