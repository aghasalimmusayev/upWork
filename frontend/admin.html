<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Panel — WorkHub</title>
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/dashboard.css" />
</head>
<body>

  <div id="navbar"></div>

  <div class="admin-layout">

    <!-- ADMIN SIDEBAR -->
    <aside class="admin-sidebar">
      <div class="admin-brand">⚙️ Admin Panel</div>
      <button class="admin-sidebar-link active" onclick="showSection('overview', this)">
        <span>📊</span> Overview
      </button>
      <button class="admin-sidebar-link" onclick="showSection('users', this)">
        <span>👥</span> Users
      </button>
      <button class="admin-sidebar-link" onclick="showSection('jobs', this)">
        <span>💼</span> Jobs
      </button>
      <button class="admin-sidebar-link" onclick="showSection('proposals', this)">
        <span>📄</span> Proposals
      </button>
      <div class="admin-sidebar-divider"></div>
      <a href="profile.html" class="admin-sidebar-link">
        <span>👤</span> My Profile
      </a>
      <button class="admin-sidebar-link danger" onclick="_doLogout()">
        <span>🚪</span> Sign Out
      </button>
    </aside>

    <!-- ADMIN MAIN -->
    <main class="admin-main">

      <!-- ── OVERVIEW ── -->
      <div id="section-overview" class="admin-section active">
        <h2 class="mb-24">📊 Dashboard Overview</h2>
        <div class="admin-stats" id="adminStats">
          <div class="page-loader"><div class="spinner"></div></div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px" id="overviewTables">
          <div class="card">
            <div class="card-header"><h4>Recent Users</h4></div>
            <div id="recentUsersTable"><div class="page-loader"><div class="spinner spinner-sm"></div></div></div>
          </div>
          <div class="card">
            <div class="card-header"><h4>Recent Jobs</h4></div>
            <div id="recentJobsTable"><div class="page-loader"><div class="spinner spinner-sm"></div></div></div>
          </div>
        </div>
      </div>

      <!-- ── USERS ── -->
      <div id="section-users" class="admin-section">
        <div class="section-header">
          <h2>👥 All Users</h2>
          <div style="display:flex;gap:8px;flex-wrap:wrap">
            <input class="form-control" type="text" id="userSearch"
              placeholder="Search by name or email..."
              oninput="filterUsers()"
              style="width:210px" />
            <select class="form-control" id="userRoleFilter"
              onchange="filterUsers()"
              style="width:140px">
              <option value="">All Roles</option>
              <option value="CLIENT">Client</option>
              <option value="FREELANCER">Freelancer</option>
              <option value="ADMIN">Admin</option>
            </select>
          </div>
        </div>
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>#</th>
                <th>Name</th>
                <th>Email</th>
                <th>Role</th>
                <th>Phone</th>
                <th>Joined</th>
              </tr>
            </thead>
            <tbody id="usersTableBody">
              <tr><td colspan="6" class="text-center"><div class="spinner" style="margin:20px auto;width:24px;height:24px;border-width:2px"></div></td></tr>
            </tbody>
          </table>
        </div>
        <div id="usersCount" class="text-muted mt-8"></div>
      </div>

      <!-- ── JOBS ── -->
      <div id="section-jobs" class="admin-section">
        <div class="section-header">
          <h2>💼 All Jobs</h2>
          <div style="display:flex;gap:8px;flex-wrap:wrap">
            <input class="form-control" type="text" id="jobSearch"
              placeholder="Search jobs..."
              oninput="filterJobs()"
              style="width:200px" />
            <select class="form-control" id="jobStatusFilter"
              onchange="filterJobs()"
              style="width:140px">
              <option value="">All Statuses</option>
              <option value="OPEN">Open</option>
              <option value="CLOSED">Closed</option>
            </select>
          </div>
        </div>
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>#</th>
                <th>Title</th>
                <th>Category</th>
                <th>Budget</th>
                <th>Type</th>
                <th>Status</th>
                <th>Date</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody id="jobsTableBody">
              <tr><td colspan="8" class="text-center"><div class="spinner" style="margin:20px auto;width:24px;height:24px;border-width:2px"></div></td></tr>
            </tbody>
          </table>
        </div>
        <div id="jobsCount" class="text-muted mt-8"></div>
      </div>

      <!-- ── PROPOSALS ── -->
      <div id="section-proposals" class="admin-section">
        <div class="section-header">
          <h2>📄 All Proposals</h2>
          <select class="form-control" id="propStatusFilter"
            onchange="filterProposals()"
            style="width:170px">
            <option value="">All Statuses</option>
            <option value="PENDING">Pending</option>
            <option value="ACCEPTED">Accepted</option>
            <option value="REJECTED">Rejected</option>
            <option value="WITHDRAWN">Withdrawn</option>
          </select>
        </div>
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>#</th>
                <th>Job Title</th>
                <th>Amount</th>
                <th>Est. Days</th>
                <th>Status</th>
                <th>Date</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody id="proposalsTableBody">
              <tr><td colspan="7" class="text-center"><div class="spinner" style="margin:20px auto;width:24px;height:24px;border-width:2px"></div></td></tr>
            </tbody>
          </table>
        </div>
        <div id="propsCount" class="text-muted mt-8"></div>
      </div>

    </main>
  </div>

  <script src="js/api.js"></script>
  <script src="js/main.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
