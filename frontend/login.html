<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — WorkHub</title>
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/auth.css" />
</head>
<body>

  <div id="navbar"></div>

  <main class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">Work<span>Hub</span></div>
      <h1 class="auth-title">Welcome back</h1>
      <p class="auth-subtitle">Sign in to your account to continue</p>

      <div id="loginAlert" class="alert alert-danger hidden"></div>

      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input
          class="form-control"
          type="email"
          id="email"
          placeholder="you@example.com"
          autocomplete="email"
        />
      </div>

      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="input-wrapper">
          <input
            class="form-control"
            type="password"
            id="password"
            placeholder="Enter your password"
            autocomplete="current-password"
          />
          <button class="input-eye" onclick="togglePwd('password', this)" type="button" title="Show/hide password">👁</button>
        </div>
      </div>

      <button class="btn btn-primary btn-lg btn-block" id="loginBtn" onclick="handleLogin()">
        Sign In
      </button>

      <div class="auth-footer">
        Don't have an account? <a href="register.html">Create one</a>
      </div>
    </div>
  </main>

  <script src="js/api.js"></script>
  <script src="js/main.js"></script>
  <script>
    renderNavbar('');
    redirectIfLoggedIn();

    function togglePwd(id, btn) {
      const el = document.getElementById(id);
      if (el.type === 'password') { el.type = 'text'; btn.textContent = '🙈'; }
      else                        { el.type = 'password'; btn.textContent = '👁'; }
    }

    async function handleLogin() {
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn      = document.getElementById('loginBtn');

      hideAlert('loginAlert');

      if (!email || !password) {
        showAlert('loginAlert', 'Please fill in all fields.');
        return;
      }

      setBtnLoading(btn, true, 'Signing in...');
      try {
        const res = await AuthAPI.login({ email, password });
        Auth.setSession(res.user, res.accessToken);

        showToast('Welcome back, ' + (res.user.name || res.user.email) + '!', 'success');

        const role = res.user.role;
        setTimeout(() => {
          if (role === 'ADMIN') window.location.href = 'admin.html';
          else window.location.href = 'dashboard.html';
        }, 600);
      } catch (err) {
        showAlert('loginAlert', getErrorMessage(err));
        setBtnLoading(btn, false);
      }
    }

    // Enter key submit
    ['email', 'password'].forEach(id => {
      document.getElementById(id).addEventListener('keydown', e => {
        if (e.key === 'Enter') handleLogin();
      });
    });
  </script>
</body>
</html>
