<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Giriş — FreeLance</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/auth.css" />
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-header">
        <div class="auth-logo">Free<span>Lance</span></div>
        <div class="auth-subtitle">Hesabınıza daxil olun</div>
      </div>
      <div class="auth-body">
        <div class="alert alert-danger" id="errorAlert">
          <span>❌</span><span id="errorMsg"></span>
        </div>

        <form id="loginForm" novalidate>
          <div class="form-group">
            <label class="form-label" for="email">E-mail ünvanı</label>
            <input class="form-control" type="email" id="email" placeholder="ad@example.com" required />
            <div class="form-error" id="emailErr">Düzgün e-mail daxil edin</div>
          </div>

          <div class="form-group">
            <label class="form-label" for="password">Şifrə</label>
            <div style="position:relative">
              <input class="form-control" type="password" id="password" placeholder="Şifrənizi daxil edin" style="padding-right:44px" required />
              <button type="button" id="togglePass" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--gray-500);font-size:1rem">👁</button>
            </div>
            <div class="form-error" id="passErr">Şifrə tələb olunur</div>
          </div>

          <button type="submit" class="btn btn-primary btn-block btn-lg" id="submitBtn">
            Daxil Ol
          </button>
        </form>

        <div class="auth-footer">
          Hesabınız yoxdur? <a href="register.html">Qeydiyyatdan keçin</a>
        </div>
        <div class="auth-footer mt-8">
          <a href="jobs.html" style="color:var(--gray-500)">← İşlərə baxmağa davam et</a>
        </div>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script>
    requireGuest();

    const form = document.getElementById('loginForm');
    const submitBtn = document.getElementById('submitBtn');
    const errorAlert = document.getElementById('errorAlert');
    const errorMsg = document.getElementById('errorMsg');

    document.getElementById('togglePass').addEventListener('click', function() {
      const p = document.getElementById('password');
      p.type = p.type === 'password' ? 'text' : 'password';
      this.textContent = p.type === 'password' ? '👁' : '🙈';
    });

    function showError(msg) {
      errorMsg.textContent = msg;
      errorAlert.classList.add('show');
    }
    function hideError() { errorAlert.classList.remove('show'); }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideError();

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      let valid = true;

      document.getElementById('emailErr').classList.remove('show');
      document.getElementById('passErr').classList.remove('show');
      document.getElementById('email').classList.remove('is-error');
      document.getElementById('password').classList.remove('is-error');

      if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        document.getElementById('emailErr').classList.add('show');
        document.getElementById('email').classList.add('is-error');
        valid = false;
      }
      if (!password || password.length < 8) {
        document.getElementById('passErr').classList.add('show');
        document.getElementById('password').classList.add('is-error');
        valid = false;
      }
      if (!valid) return;

      submitBtn.classList.add('btn-loading');
      submitBtn.disabled = true;

      try {
        const data = await AuthAPI.login({ email, password });
        Auth.setSession(data.user, data.accessToken);
        showToast('Uğurla daxil oldunuz! 🎉', 'success');
        setTimeout(() => {
          if (data.user.role === 'ADMIN') window.location.href = '/admin.html';
          else window.location.href = '/dashboard.html';
        }, 500);
      } catch (err) {
        showError(getErrorMessage(err));
        submitBtn.classList.remove('btn-loading');
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
